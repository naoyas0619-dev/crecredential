spring.application.name=kurekure-credential

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kurekure_credential}
spring.datasource.username=${DB_USERNAME:kurekure}
spring.datasource.password=${DB_PASSWORD:kurekure_password}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

server.port=${SERVER_PORT:8080}

app.jwt.secret=${JWT_SECRET:local-development-secret-change-me}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
