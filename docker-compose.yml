services:
  postgres:
    image: postgres:16
    container_name: kurekure-credential-postgres
    environment:
      POSTGRES_DB: kurekure_credential
      POSTGRES_USER: kurekure
      POSTGRES_PASSWORD: kurekure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kurekure -d kurekure_credential"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
